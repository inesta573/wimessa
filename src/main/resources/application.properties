spring.application.name=Store

# H2 Database Configuration (File-based for persistence)
spring.datasource.url=jdbc:h2:file:./data/wimessa
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (optional, for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Static Resources
spring.web.resources.static-locations=classpath:/static/,file:./

# Default Admin Credentials
admin.default.username=${DEFAULT_ADMIN_USERNAME}
admin.default.password=${DEFAULT_ADMIN_PASSWORD}
