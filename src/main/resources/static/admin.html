<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | WIMESSA</title>
    <link rel="icon" type="image/png" href="public/wimessa_icon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2>WIMESSA Admin</h2>
            </div>
            <div class="admin-nav">
                <form action="/logout" method="POST" style="display: inline;">
                    <button type="submit" class="btn btn-secondary">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Admin Dashboard -->
    <div class="admin-container">
        <div class="admin-sidebar">
            <ul class="admin-menu">
                <li><a href="#" class="admin-menu-item active" data-section="events">Events</a></li>
                <li><a href="#" class="admin-menu-item" data-section="resources">Resources</a></li>
                <li><a href="#" class="admin-menu-item" data-section="maktoub">Maktoub</a></li>
                <li><a href="#" class="admin-menu-item" data-section="settings">Settings</a></li>



            </ul>
        </div>

        <div class="admin-content">
            <!-- Events Section -->
            <section id="events-section" class="admin-section active">
                <div class="section-header">
                    <h2>Manage Events</h2>
                    <button class="btn btn-primary" onclick="showEventForm()">Add Event</button>
                </div>

                <!-- Event Form -->
                <div id="event-form-container" class="form-container" style="display: none;">
                    <h3 id="event-form-title">Add New Event</h3>
                    <form id="event-form">
                        <input type="hidden" id="event-id">
                        <div class="form-group">
                            <label for="event-title">Event Title</label>
                            <input type="text" id="event-title" required>
                        </div>
                        <div class="form-group">
                            <label for="event-description">Description</label>
                            <textarea id="event-description" rows="4" required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="event-location">Location</label>
                            <input type="text" id="event-location" required>
                        </div>
                        <div class="form-group">
                            <label for="event-date">Date</label>
                            <input type="datetime-local" id="event-date" required>
                        </div>
                        <div class="form-group">
                            <label for="event-time">Time</label>
                            <input type="text" id="event-time" placeholder="e.g., 6:00 PM - 8:00 PM" required>
                        </div>
                        <div class="form-group">
                            <label for="event-category">Category</label>
                            <select id="event-category" required>
                                <option value="upcoming">Upcoming</option>
                                <option value="past">Past</option>
                            </select>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Save Event</button>
                            <button type="button" class="btn btn-secondary" onclick="hideEventForm()">Cancel</button>
                        </div>
                    </form>
                </div>

                <!-- Events List -->
                <div class="admin-list">
                    <h3>All Events</h3>
                    <div id="events-list"></div>
                </div>
            </section>

            <!-- Resources Section -->
            <section id="resources-section" class="admin-section" style="display: none;">
                <div class="section-header">
                    <h2>Manage Resources</h2>
                    <button class="btn btn-primary" onclick="showResourceForm()">Add Resource</button>
                </div>

                <!-- Resource Form -->
                <div id="resource-form-container" class="form-container" style="display: none;">
                    <h3 id="resource-form-title">Add New Resource</h3>
                    <form id="resource-form">
                        <input type="hidden" id="resource-id">
                        <div class="form-group">
                            <label for="resource-title">Resource Title</label>
                            <input type="text" id="resource-title" required>
                        </div>
                        <div class="form-group">
                            <label for="resource-description">Description</label>
                            <textarea id="resource-description" rows="4" required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="resource-category">Category</label>
                            <input type="text" id="resource-category" placeholder="e.g., Academic, Research, Career" required>
                        </div>
                        <div class="form-group">
                            <label for="resource-link">Link</label>
                            <input type="url" id="resource-link" placeholder="https://..." required>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Save Resource</button>
                            <button type="button" class="btn btn-secondary" onclick="hideResourceForm()">Cancel</button>
                        </div>
                    </form>
                </div>

                <!-- Resources List -->
                <div class="admin-list">
                    <h3>All Resources</h3>
                    <div id="resources-list"></div>
                </div>
            </section>

            <!-- Maktoub Section -->
            <section id="maktoub-section" class="admin-section" style="display: none;">
                <div class="section-header">
                    <h2>Manage Maktoub Stories</h2>
                    <button class="btn btn-primary" onclick="showMaktoubForm()">Add Story</button>
                </div>

                <!-- Maktoub Form -->
                <div id="maktoub-form-container" class="form-container" style="display: none;">
                    <h3 id="maktoub-form-title">Add New Story</h3>
                    <form id="maktoub-form" enctype="multipart/form-data">
                        <input type="hidden" id="maktoub-id">
                        <div class="form-group">
                            <label for="maktoub-paper-type">Type of Paper</label>
                            <select id="maktoub-paper-type" required>
                                <option value="">Select paper type...</option>
                                <option value="Personal Essay">Personal Essay</option>
                                <option value="Research Paper">Research Paper</option>
                                <option value="Creative Writing">Creative Writing</option>
                                <option value="Short Story">Short Story</option>
                                <option value="Poetry">Poetry</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="maktoub-title">Title</label>
                            <input type="text" id="maktoub-title" required>
                        </div>
                        <div class="form-group">
                            <label for="maktoub-student-name">Student Name</label>
                            <input type="text" id="maktoub-student-name" required>
                        </div>
                        <div class="form-group">
                            <label for="maktoub-date">Date</label>
                            <input type="date" id="maktoub-date" required>
                        </div>
                        <div class="form-group">
                            <label for="maktoub-description">Description</label>
                            <textarea id="maktoub-description" rows="4" required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="maktoub-pdf">Upload PDF</label>
                            <input type="file" id="maktoub-pdf" accept=".pdf" required>
                            <small>Please upload the story in PDF format</small>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Post Story</button>
                            <button type="button" class="btn btn-secondary" onclick="hideMaktoubForm()">Cancel</button>
                        </div>
                    </form>
                </div>

                <!-- Maktoub List -->
                <div class="admin-list">
                    <h3>All Stories</h3>
                    <div id="maktoub-list"></div>
                </div>
            </section>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
